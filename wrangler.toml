name = "blogverse"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
# Environment variables are set in the Cloudflare dashboard

[[d1_databases]]
binding = "DB"
database_name = "blogverse_db"
database_id = "5a62553c-e713-4047-9dd9-4764866754be"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "blogverse-assets"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "blogverse_events"
